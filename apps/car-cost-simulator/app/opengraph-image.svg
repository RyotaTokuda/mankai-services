<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景グラデーション -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- アクセントライン上部 -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- 左の車アイコン（青） -->
  <g transform="translate(120, 200) scale(3)">
    <rect x="2" y="14" width="12" height="7" rx="2" fill="#3b82f6"/>
    <rect x="4" y="11" width="8" height="5" rx="1.5" fill="#60a5fa"/>
    <circle cx="5" cy="22" r="2" fill="#1e3a5f"/>
    <circle cx="11" cy="22" r="2" fill="#1e3a5f"/>
  </g>

  <!-- 比較矢印 -->
  <g transform="translate(200, 240)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <polygon points="35,-8 48,0 35,8" fill="#f59e0b"/>
    <line x1="48" y1="25" x2="8" y2="25" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <polygon points="13,17 0,25 13,33" fill="#f59e0b"/>
  </g>

  <!-- 右の車アイコン（緑） -->
  <g transform="translate(280, 200) scale(3)">
    <rect x="2" y="14" width="12" height="7" rx="2" fill="#10b981"/>
    <rect x="4" y="11" width="8" height="5" rx="1.5" fill="#34d399"/>
    <circle cx="5" cy="22" r="2" fill="#064e3b"/>
    <circle cx="11" cy="22" r="2" fill="#064e3b"/>
  </g>

  <!-- タイトル -->
  <text x="460" y="240" font-family="sans-serif" font-size="52" font-weight="800" fill="#1e293b">
    車の維持費
  </text>
  <text x="460" y="305" font-family="sans-serif" font-size="52" font-weight="800" fill="#1e293b">
    シミュレーター
  </text>

  <!-- サブタイトル -->
  <text x="460" y="365" font-family="sans-serif" font-size="22" fill="#64748b">
    ローン・保険・駐車場・燃料・車検を
  </text>
  <text x="460" y="395" font-family="sans-serif" font-size="22" fill="#64748b">
    まとめて入力して即座に比較
  </text>

  <!-- 特徴バッジ -->
  <rect x="460" y="430" width="120" height="32" rx="16" fill="#dbeafe"/>
  <text x="520" y="451" font-family="sans-serif" font-size="14" font-weight="600" fill="#2563eb" text-anchor="middle">117車種対応</text>

  <rect x="600" y="430" width="100" height="32" rx="16" fill="#d1fae5"/>
  <text x="650" y="451" font-family="sans-serif" font-size="14" font-weight="600" fill="#059669" text-anchor="middle">完全無料</text>

  <rect x="720" y="430" width="120" height="32" rx="16" fill="#fef3c7"/>
  <text x="780" y="451" font-family="sans-serif" font-size="14" font-weight="600" fill="#d97706" text-anchor="middle">複数台比較OK</text>

  <!-- フッター -->
  <rect x="0" y="560" width="1200" height="70" fill="white" opacity="0.7"/>
  <text x="600" y="600" font-family="sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">
    kuraberu-lab.com/tools/car-cost/
  </text>
</svg>
